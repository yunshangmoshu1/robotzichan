services:
  # 后端 API
  - type: web
    name: robo-track-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DINGTALK_APP_KEY
        sync: false
      - key: DINGTALK_APP_SECRET
        sync: false

  # 前端静态站点
  - type: static_site
    name: robo-track-frontend
    rootDir: client
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://robo-track-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
